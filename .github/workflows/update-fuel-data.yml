name: Update Fuel Data

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fuel price scraper
        run: python fuel_prices1.py
        env:
          FUEL_CLIENT_ID: ${{ secrets.FUEL_CLIENT_ID }}
          FUEL_CLIENT_SECRET: ${{ secrets.FUEL_CLIENT_SECRET }}

      - name: Commit and push updated data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add fuel_data.json
          git commit -m "Update fuel data $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
